<!-- MODIFICATION DU MODAL POUR INCLURE LE CHOIX CSV -->
<div class="modal" id="pdf-modal">
    <div class="modal-content">
        <h3>💾 Sauvegarde & Export</h3>
        <label><input type="radio" name="export-type" value="pdf" checked> Rapport PDF</label><br>
        <label><input type="radio" name="export-type" value="csv"> Sauvegarde CSV (Données complètes)</label>
        <div class="months-list" id="pdf-months-list"></div>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="closePdfModal()">Annuler</button>
            <button onclick="executeExport()">Valider</button>
        </div>
    </div>
</div>

<script>
    // --- NOUVELLES FONCTIONS D'EXPORT/IMPORT ---

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
    }

    function executeExport() {
        const type = document.querySelector('input[name="export-type"]:checked').value;
        if(type === 'pdf') {
            generatePDFReport();
        } else {
            exportAppDataCSV();
        }
    }

    function exportAppDataCSV() {
        const dataStr = JSON.stringify(appData);
        const blob = new Blob([dataStr], {type: "text/csv"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "budget_backup_" + new Date().toISOString().slice(0,10) + ".csv";
        a.click();
        closePdfModal();
    }

    function importData(event) {
        if(!confirm("⚠️ ATTENTION : L'importation va supprimer vos données actuelles. Confirmez-vous ?")) return;
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            appData = JSON.parse(e.target.result);
            saveDataLocal();
            location.reload();
        };
        reader.readAsText(file);
    }

    // --- MISE À JOUR DE LA PAGE 2 (Ajout boutons dans le card paramètres) ---

</script>
